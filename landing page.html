<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>landing page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Base ── */
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0e6ff 30%, #fce7f3 60%, #e0f2fe 100%);
      background-attachment: fixed;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ── Subtle animated orbs for depth ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      top: -150px;
      right: -100px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #f9a8d4, transparent 70%);
      bottom: -120px;
      left: -80px;
    }

    /* ── Card container ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 32px;
      padding: 56px 48px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        0 1px 3px rgba(0, 0, 0, 0.04);
      animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Profile image ── */
    .profile-img-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #a78bfa, #f472b6, #38bdf8);
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .profile-img-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #fff;
    }

    /* ── Name heading ── */
    .name {
      font-size: 2rem;
      font-weight: 700;
      color: #1e1b4b;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6b7280;
      letter-spacing: 0.04em;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .subtitle span {
      color: #8b5cf6;
      font-weight: 500;
    }

    /* ── Button ── */
    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      padding: 14px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }

    .btn-enter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      opacity: 0;
      transition: opacity 0.35s ease;
      border-radius: inherit;
    }

    .btn-enter:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.45);
    }

    .btn-enter:hover::before {
      opacity: 1;
    }

    .btn-enter:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
    }

    .btn-enter span,
    .btn-enter svg {
      position: relative;
      z-index: 1;
    }

    .btn-enter svg {
      width: 18px;
      height: 18px;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-enter:hover svg {
      transform: translateX(4px);
    }

    /* ── Small decorative dot grid (corner accent) ── */
    .dot-grid {
      position: fixed;
      top: 28px;
      left: 28px;
      display: grid;
      grid-template-columns: repeat(4, 6px);
      gap: 8px;
      z-index: 1;
      opacity: 0.18;
    }

    .dot-grid span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7c3aed;
    }

    /* ── Bottom-right accent line ── */
    .accent-line {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      z-index: 1;
      opacity: 0.15;
    }

    .accent-line::before,
    .accent-line::after {
      content: '';
      position: absolute;
      background: #7c3aed;
      border-radius: 2px;
    }

    .accent-line::before {
      width: 48px;
      height: 2px;
      bottom: 0;
      right: 0;
    }

    .accent-line::after {
      width: 2px;
      height: 48px;
      bottom: 0;
      right: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card {
        padding: 44px 28px 36px;
        border-radius: 24px;
      }

      .profile-img-wrapper {
        width: 100px;
        height: 100px;
        margin-bottom: 24px;
      }

      .name {
        font-size: 1.65rem;
      }

      .subtitle {
        font-size: 0.82rem;
        margin-bottom: 28px;
      }

      .btn-enter {
        padding: 13px 32px;
        font-size: 0.9rem;
      }

      .dot-grid {
        top: 16px;
        left: 16px;
      }

      .accent-line {
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Decorative corner elements -->
  <div class="dot-grid">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="accent-line"></div>

  <!-- Main card -->
  <div class="card">
    <div class="profile-img-wrapper">
      <img
        src="images/yashu image.png"
        alt="Yashwanth"
      >
    </div>
    <h1 class="name">Yashwanth</h1>
    <p class="subtitle">
      <span>Student</span> · Web Developer · <span>Learner</span>
    </p>
    <a href="yashwanth portfolio.html" class="btn-enter">
      <span>Enter Website</span>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/>
        <path d="M13 6l6 6-6 6"/>
      </svg>
    </a>
  </div>

</body>
</html>
